  <script src="/_sdk/719055fef2a85d14.editing_sdk.js" integrity="sha512-kFqrdGgIiTOsu307feB5Cy3JVP9IayftsmCIZ0csxYBGuBmJQPhyvcnmKR8F0fTW97h5s1gAvz3SumI8zJ6OxQ=="></script>
  <script>
    // Audio
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playTone(freq, dur, type='square') {
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = type; o.frequency.value = freq; g.gain.value = 0.15;
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
        o.stop(audioCtx.currentTime + dur);
    }
    function playCorrect() { playTone(523,0.1); setTimeout(()=>playTone(659,0.1),100); setTimeout(()=>playTone(784,0.2),200); }
    function playWrong() { playTone(200,0.3,'sawtooth'); }
    function playCountdown() { playTone(440,0.3); }
    function playWin() { [0,150,300,450,600].forEach((d,i)=>setTimeout(()=>playTone(523+i*100,0.2,'sine'),d)); }

    // Modes
    const MODES = [
        {id:'tambah',icon:'➕',label:'Tambah'},{id:'kurang',icon:'➖',label:'Kurang'},
        {id:'kali',icon:'✖',label:'Kali'},{id:'bagi',icon:'➗',label:'Bagi'},
        {id:'pangkat2',icon:'x²',label:'Pangkat 2'},{id:'pangkat3',icon:'x³',label:'Pangkat 3'},
        {id:'akar',icon:'√',label:'Akar'},{id:'persen',icon:'%',label:'Persen'},
        {id:'fpb',icon:'📐',label:'FPB'},{id:'kpk',icon:'📏',label:'KPK'},
        {id:'waktu',icon:'🕐',label:'Waktu'},{id:'jarak',icon:'📍',label:'Jarak'},
        {id:'tambah_kurang',icon:'±',label:'Tambah Kurang'},{id:'kali_bagi',icon:'×÷',label:'Kali Bagi'},
        {id:'campuran',icon:'🎲',label:'Campuran'},{id:'konversi',icon:'🔄',label:'Konversi'}
    ];

    let currentGame = null, currentMode = 'tambah';
    let bPos = [0,0], tPos = 0; // tPos: -5 to +5
    let bAnswers = [0,0], tAnswers = [0,0];
    let gameActive = false;

    function generateQuestion(mode) {
        let a,b,q,ans;
        const r = (min,max) => Math.floor(Math.random()*(max-min+1))+min;
        switch(mode) {
            case 'tambah': a=r(1,50);b=r(1,50);q=`${a} + ${b} = ?`;ans=a+b;break;
            case 'kurang': a=r(10,99);b=r(1,a);q=`${a} - ${b} = ?`;ans=a-b;break;
            case 'kali': a=r(2,12);b=r(2,12);q=`${a} × ${b} = ?`;ans=a*b;break;
            case 'bagi': b=r(2,9);ans=r(2,12);a=b*ans;q=`${a} ÷ ${b} = ?`;break;
            case 'pangkat2': a=r(2,12);q=`${a}² = ?`;ans=a*a;break;
            case 'pangkat3': a=r(2,6);q=`${a}³ = ?`;ans=a*a*a;break;
            case 'akar': ans=r(2,12);a=ans*ans;q=`√${a} = ?`;break;
            case 'persen': a=r(1,10)*10;b=r(10,100);q=`${a}% dari ${b} = ?`;ans=a*b/100;break;
            case 'fpb': { const primes=[2,3,5,7]; const p=primes[r(0,3)]; a=p*r(2,6); b=p*r(2,6); const gcd=(x,y)=>y?gcd(y,x%y):x; ans=gcd(a,b); q=`FPB(${a},${b}) = ?`;break; }
            case 'kpk': { a=r(2,8);b=r(2,8); const gcd=(x,y)=>y?gcd(y,x%y):x; ans=(a*b)/gcd(a,b); q=`KPK(${a},${b}) = ?`;break; }
            case 'waktu': { a=r(1,5);q=`${a} jam = ? menit`;ans=a*60;break; }
            case 'jarak': { a=r(1,9);q=`${a} km = ? m`;ans=a*1000;break; }
            case 'konversi': { a=r(1,9);q=`${a} m = ? cm`;ans=a*100;break; }
            case 'tambah_kurang': if(Math.random()>0.5){a=r(1,50);b=r(1,50);q=`${a}+${b}=?`;ans=a+b;}else{a=r(10,99);b=r(1,a);q=`${a}-${b}=?`;ans=a-b;}break;
            case 'kali_bagi': if(Math.random()>0.5){a=r(2,12);b=r(2,12);q=`${a}×${b}=?`;ans=a*b;}else{b=r(2,9);ans=r(2,12);a=b*ans;q=`${a}÷${b}=?`;}break;
            default: a=r(1,50);b=r(1,50);q=`${a}+${b}=?`;ans=a+b;
        }
        return {q,ans};
    }

    function buildNumpad(containerId, player, game) {
        const c = document.getElementById(containerId); c.innerHTML='';
        for(let i=1;i<=9;i++) { c.appendChild(makeBtn(String(i),()=>inputDigit(player,game,String(i)))); }
        c.appendChild(makeBtn('C',()=>clearInput(player,game),'bg-red-400 text-white'));
        c.appendChild(makeBtn('0',()=>inputDigit(player,game,'0')));
        c.appendChild(makeBtn('Go',()=>submitAnswer(player,game),'bg-green-500 text-white'));
    }
    function makeBtn(txt,fn,cls='bg-white') {
        const b=document.createElement('button');
        b.textContent=txt; b.className=`numpad-btn ${cls} rounded-xl p-2 font-bold text-lg shadow hover:shadow-md`; b.onclick=fn; return b;
    }

    function inputDigit(p,game,d) { if(!gameActive) return; const el=document.getElementById(`${game}-a${p+1}`); if(el.textContent.length<6) el.textContent+=d; }
    function clearInput(p,game) { document.getElementById(`${game}-a${p+1}`).textContent=''; }

    function submitAnswer(p,game) {
        if(!gameActive) return;
        const el=document.getElementById(`${game}-a${p+1}`);
        const val=parseInt(el.textContent);
        const ans = game==='b' ? bAnswers[p] : tAnswers[p];
        if(val===ans) {
            playCorrect(); el.textContent='✓'; el.style.background='#bbf7d0';
            setTimeout(()=>{el.textContent='';el.style.background='';},400);
            if(game==='b') { bPos[p]++; updateBalap(); if(bPos[p]>=10) winGame(p); else newQuestion(p,'b'); }
            else { tPos += p===0 ? -1 : 1; updateTarik(); if(Math.abs(tPos)>=5) winGame(tPos<0?0:1); else newQuestion(p,'t'); }
        } else { playWrong(); el.style.background='#fecaca'; setTimeout(()=>{el.textContent='';el.style.background='';},300); }
    }

    function newQuestion(p,game) {
        const mode = game==='b'?'campuran':currentMode;
        const {q,ans} = generateQuestion(mode);
        document.getElementById(`${game}-q${p+1}`).textContent = q;
        if(game==='b') bAnswers[p]=ans; else tAnswers[p]=ans;
    }

    function updateBalap() {
        for(let i=0;i<2;i++) {
            document.getElementById(`b-bar${i+1}`).style.width = (bPos[i]*10)+'%';
            document.getElementById(`b-pos${i+1}`).textContent = `Posisi: ${bPos[i]}/10`;
            document.getElementById(`b-char${i+1}`).style.left = (5+bPos[i]*8.5)+'%';
        }
    }
    function updateTarik() {
        document.getElementById('t-marker').style.left = `calc(50% + ${tPos*7}%)`;
    }

    function winGame(p) {
        gameActive=false; playWin(); spawnConfetti();
        document.getElementById('winner-text').textContent = `Pemain ${p+1} Menang! 🎉`;
        document.getElementById('winner-overlay').style.display='flex';
    }

    function spawnConfetti() {
        const colors=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6bff'];
        for(let i=0;i<40;i++) {
            const d=document.createElement('div'); d.className='confetti-piece';
            d.style.left=Math.random()*100+'%'; d.style.top='-10px';
            d.style.background=colors[i%colors.length]; d.style.borderRadius=Math.random()>0.5?'50%':'0';
            d.style.animationDelay=Math.random()*1+'s';
            document.body.appendChild(d); setTimeout(()=>d.remove(),3500);
        }
    }

    function startCountdown(cb) {
        const ov=document.getElementById('countdown-overlay');
        const txt=document.getElementById('countdown-text');
        ov.style.display='flex';
        let c=3;
        txt.textContent=c; txt.className='text-white text-8xl md:text-9xl font-black countdown-pop'; playCountdown();
        const iv=setInterval(()=>{
            c--; if(c>0){txt.textContent=c;txt.className='';void txt.offsetWidth;txt.className='text-white text-8xl md:text-9xl font-black countdown-pop';playCountdown();}
            else if(c===0){txt.textContent='Mulai!';txt.className='';void txt.offsetWidth;txt.className='text-white text-8xl md:text-9xl font-black countdown-pop';playTone(880,0.4,'sine');}
            else{clearInterval(iv);ov.style.display='none';cb();}
        },900);
    }

    function showGame(type) {
        hideAll();
        if(type==='balap') {
            document.getElementById('balap-screen').style.display='block';
            buildNumpad('b-pad1',0,'b'); buildNumpad('b-pad2',1,'b');
            bPos=[0,0]; updateBalap();
            startCountdown(()=>{ gameActive=true; newQuestion(0,'b'); newQuestion(1,'b'); });
        } else {
            document.getElementById('mode-screen').style.display='flex';
            buildModeGrid();
        }
        currentGame=type;
    }

    function buildModeGrid() {
        const g=document.getElementById('mode-grid'); g.innerHTML='';
        MODES.forEach(m=>{
            const b=document.createElement('button');
            b.className='bg-white rounded-2xl p-3 shadow-md hover:shadow-lg hover:scale-105 transition-all flex flex-col items-center gap-1';
            b.innerHTML=`<span class="text-2xl">${m.icon}</span><span class="text-xs font-bold">${m.label}</span>`;
            b.onclick=()=>startTarik(m.id); g.appendChild(b);
        });
    }

    function startTarik(mode) {
        currentMode=mode; hideAll();
        document.getElementById('tarik-screen').style.display='block';
        buildNumpad('t-pad1',0,'t'); buildNumpad('t-pad2',1,'t');
        tPos=0; updateTarik();
        startCountdown(()=>{ gameActive=true; newQuestion(0,'t'); newQuestion(1,'t'); });
    }

    function hideAll() {
        gameActive=false;
        ['menu-screen','mode-screen','balap-screen','tarik-screen'].forEach(id=>{
            document.getElementById(id).style.display='none';
        });
        document.getElementById('winner-overlay').style.display='none';
    }

    function backToMenu() { hideAll(); document.getElementById('menu-screen').style.display='flex'; }

    // Init
    document.getElementById('menu-screen').style.display='flex';
    </script>
